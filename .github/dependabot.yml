version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "major"
          - "minor"
          - "patch"
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
